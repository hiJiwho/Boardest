<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Bst-Cloud-Lite</title>
  <style>
    body { background: #0f0e17; color: #fffffe; font-family: sans-serif; padding: 20px; }
    .card { background: #16161a; border-radius: 12px; padding: 20px; border: 1px solid #e53170; }
    h2 { color: #e53170; margin-bottom: 10px; }
    .dropzone { border: 2px dashed #e53170; padding: 30px; text-align: center; border-radius: 10px; margin: 15px 0; background: #242629; }
    button { background: #e53170; color: #fff; font-weight: bold; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>☁️ Bst-Cloud-Lite 파일 관리 및 반별 맵핑</h2>
    <p>파일 추가, 폴더 생성 및 반별 맵핑을 간편하게 수행하세요.</p>
    <div class="dropzone">여기에 드래그하여 파일 업로드 및 맵핑</div>
    <button onclick="alert('Bst-Cloud-Lite 준비 완료')">폴더 생성</button>
  </div>
</body>
</html>
