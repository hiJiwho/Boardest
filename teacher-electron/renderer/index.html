<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boardest Teacher - 교사 주간 시간표</title>
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 메인 레이아웃 컨테이너 -->
  <div id="app">
    
    <!-- 1. 설정 화면 -->
    <div id="setup-view" class="view-panel active">
      <div class="setup-card">
        <div class="setup-icon">🎓</div>
        <h2>시간표 설정하기</h2>
        <p class="subtitle">학교 정보와 교사 약칭을 등록하여 주간 수업 시간표를 불러오세요.</p>

        <!-- 학교명 검색 -->
        <div class="form-group">
          <label>학교명 검색</label>
          <div class="search-box">
            <input type="text" id="school-search-input" placeholder="예: 양동중학교, 서울고등학교">
            <button id="school-search-btn">
              <span class="icon">🔍</span> 검색
            </button>
          </div>
        </div>

        <!-- 학교 검색 결과 -->
        <div id="search-results-container" class="search-results-list hidden">
          <!-- JS로 동적 렌더링 -->
        </div>

        <!-- 선택된 학교 표시 -->
        <div class="form-group">
          <label>선택된 학교</label>
          <div id="selected-school-status" class="selected-status-box empty">
            지정된 학교 없음
          </div>
        </div>

        <!-- 교사명 입력 -->
        <div class="form-group">
          <label>교사 실명 약칭 (2글자)</label>
          <input type="text" id="teacher-name-input" placeholder="예: 김희, 이정, 박수" maxlength="6">
          <p class="input-tip">컴시간 시간표에 등록된 실명 약칭 2자리를 기입하세요.</p>
        </div>

        <!-- 제출 버튼 -->
        <button id="submit-setup-btn" class="primary-btn">
          <span class="icon">✓</span> 시간표 생성 및 시작
        </button>
      </div>
    </div>

    <!-- 2. 주간 시간표 메인 화면 -->
    <div id="timetable-view" class="view-panel">
      <!-- 헤더 바 -->
      <header class="app-header">
        <div class="header-left">
          <div class="logo">📅 Boardest <span>Teacher</span></div>
          <div id="active-school-info" class="meta-info">양동중학교 | 김희 선생님</div>
        </div>
        <div class="header-right">
          <div id="update-notification" class="update-banner hidden">
            <span class="update-text">새 버전 발견!</span>
            <button id="update-install-btn">업데이트 및 재시작</button>
          </div>
          <button id="reset-setup-btn" class="danger-btn">
            <span class="icon">⚙</span> 설정 초기화
          </button>
        </div>
      </header>

      <!-- 주간 컬럼 영역 -->
      <main class="timetable-grid" id="timetable-grid-container">
        <!-- JS에서 월요일~금요일 컬럼을 동적으로 생성 -->
      </main>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
